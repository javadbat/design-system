      <rect x="30" y="62" width="202" height="90" rx="18" fill="#ffe4e6" stroke="#fda4af"/>
      <rect x="54" y="88" width="92" height="12" rx="6" fill="#be3455"/>
      <rect x="54" y="116" width="136" height="10" rx="5" fill="#be3455" opacity="0.5"/>
      <circle cx="198" cy="106" r="20" fill="#ffd166"/>
    </g>

    <g transform="translate(270 386) rotate(-4)" filter="url(#soft-shadow)">
