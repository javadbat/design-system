    <filter id="deep-shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#10213f" flood-opacity="0.24"/>
    </filter>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .mono { font-family: "JetBrains Mono", Consolas, monospace; }
      .headline { font-size: 62px; font-weight: 850; letter-spacing: 0; fill: #111827; }
      .subhead { font-size: 25px; font-weight: 560; letter-spacing: 0; fill: #334155; }
      .small { font-size: 17px; font-weight: 700; letter-spacing: 0; fill: #475569; }
      .chip-text { font-size: 16px; font-weight: 760; letter-spacing: 0; }
      .theme-name { font-size: 17px; font-weight: 800; letter-spacing: 0; }
      .ui-label { font-size: 13px; font-weight: 760; letter-spacing: 0; }
      .ui-small { font-size: 12px; font-weight: 650; letter-spacing: 0; }
    </style>
