      <text class="font theme-name" x="103" y="37" fill="#9d174d">Candy</text>
      <rect x="29" y="59" width="200" height="76" rx="17" fill="#fff" stroke="#fbcfe8"/>
      <rect x="52" y="82" width="98" height="12" rx="6" fill="#ec4899"/>
      <rect x="52" y="110" width="126" height="10" rx="5" fill="#ec4899" opacity="0.45"/>
