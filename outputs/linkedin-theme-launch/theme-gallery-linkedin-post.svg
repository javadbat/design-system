    <path d="M693 26h330c55 0 100 45 100 100v343c0 55-45 100-100 100H693c-55 0-100-45-100-100V126c0-55 45-100 100-100Z" fill="#fff"/>
    <path d="M764 69h214c38 0 68 30 68 68v218c0 38-30 68-68 68H764c-38 0-68-30-68-68V137c0-38 30-68 68-68Z" fill="#dbeafe"/>
  </g>

  <g transform="translate(58 64)">
