<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="title desc">
  <title id="title">LinkedIn post image for the new theme gallery</title>
  <desc id="desc">A launch graphic showing many custom themes for the design system with exact promotional text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.42" stop-color="#eef5ff"/>
      <stop offset="1" stop-color="#fff2f7"/>
    </linearGradient>
    <radialGradient id="glow-blue" cx="0.75" cy="0.18" r="0.62">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-pink" cx="0.95" cy="0.78" r="0.7">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
