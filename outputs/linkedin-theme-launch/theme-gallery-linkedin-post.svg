      <path d="M202 111h18M211 102v18" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g transform="translate(360 202) rotate(4)" filter="url(#soft-shadow)">
      <rect width="248" height="188" rx="24" fill="#1f4032"/>
      <text class="font theme-name" x="96" y="38" fill="#ffe8a3">Forest</text>
      <rect x="30" y="62" width="188" height="86" rx="17" fill="#183629" stroke="#4a775f"/>
      <rect x="52" y="87" width="86" height="12" rx="6" fill="#ffe8a3"/>
      <rect x="52" y="114" width="126" height="10" rx="5" fill="#fef3c7" opacity="0.75"/>
      <rect x="52" y="136" width="66" height="10" rx="5" fill="#fef3c7" opacity="0.5"/>
