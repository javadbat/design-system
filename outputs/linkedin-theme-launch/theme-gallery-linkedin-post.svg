  <g transform="translate(676 462)" opacity="0.96">
    <rect x="0" y="0" width="152" height="42" rx="21" fill="#fff" stroke="#dbe3ef"/>
    <circle cx="26" cy="21" r="9" fill="#111827"/>
    <text class="font ui-label" x="44" y="26" fill="#1f2937">Carbon</text>
    <rect x="170" y="0" width="152" height="42" rx="21" fill="#fff" stroke="#dbe3ef"/>
    <circle cx="196" cy="21" r="9" fill="#1967d2"/>
    <text class="font ui-label" x="214" y="26" fill="#1f2937">Material</text>
    <rect x="340" y="0" width="152" height="42" rx="21" fill="#fff" stroke="#dbe3ef"/>
    <circle cx="366" cy="21" r="9" fill="#ec4899"/>
    <text class="font ui-label" x="384" y="26" fill="#1f2937">Candy</text>
